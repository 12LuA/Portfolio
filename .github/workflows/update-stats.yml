name: Update GitHub Stats

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: repo checkout
        uses: actions/checkout@v3

      - name: install node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: install dependencies
        run: npm install

      - name: generate stats 
        run: node .github/scripts/fetchGithubStats.js
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Änderungen committen
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/stats.json
          git commit -m "Update stats.json" || echo "No changes"

      - name: Push
        run: git push
